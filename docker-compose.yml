services:
  postgres:
    image: postgres:16
    container_name: pmcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pmcs
      POSTGRES_PASSWORD: pmcs
      POSTGRES_DB: pmcs
    ports:
      - "5432:5432"
    volumes:
      - pmcs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmcs -d pmcs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pmcs_pgdata:
